# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: Windows

on:
  push:
    branches: [ "build", "runtime-setup" ]
  pull_request:
    branches: [ "main" ]


jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Download Files
      shell: powershell
      run: .\download.ps1
    
    - name: Setup Runtime
      run: |
        .\Runtime\python.exe .\Runtime\get-pip.py
        .\Runtime\python.exe -m pip install setuptools numpy
        .\Runtime\python.exe -m pip install -r .\Scripts\requirements.txt
        .\Runtime\python.exe -m pip uninstall sympy -y

    - name: Zip the folder
      shell: powershell
      run: |
        Compress-Archive -Path .\Scripts, .\Runtime -DestinationPath .\Moeroid-Runtime-win64.zip

    - name: Upload Wheel to Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: Daily-Build
        files: |
          .\Moeroid-Runtime-win64.zip